experiment_name: resnet20_cifar10_edges_to_frequency
seed: 42

dataset:
  name: cifar10
  validation_split: 0.1
  normalize: true
  augment: false

model:
  name: resnet20
  input_shape: [32, 32, 3]
  num_classes: 10

initializer:
  mode: per_layer
  default:
    name: he
    seed: 42

  layer_map:
    stem_conv:
      name: grad_vertical_pure
      scale: 1.0
      noise_std: 0.0
      seed: 42

    group1_block1_conv1:
      name: grad_horizontal_pure
      scale: 1.0
      noise_std: 0.0
      seed: 42

    group2_block1_conv1:
      name: dctlow
      scale: 1.0
      noise_std: 0.0
      seed: 42

    group3_block1_conv1:
      name: dctlow_noise
      scale: 1.0
      noise_std: 0.05
      seed: 42

training:
  optimizer: sgd
  learning_rate: 0.1
  momentum: 0.9
  batch_size: 32
  epochs: 50

  scheduler:
    type: multistep
    milestones: [3, 5]
    gamma: 0.1

  early_stopping:
    enabled: true
    monitor: val_loss
    patience: 5
    min_delta: 0.0
    restore_best_weights: true

runtime:
  run_root: runs
  deterministic: true
  verbose: 1

checkpoints:
  enabled: true
  save_initial: true
  save_final: true
  save_epochs: [1, 5, 10, 20, 30, 40, 50]