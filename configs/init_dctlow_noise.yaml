experiment_name: init_resnet20_cifar10_dctlow_noise
seed: 42

dataset:
  name: cifar10
  validation_split: 0.1
  normalize: true
  augment: false

model:
  name: resnet20
  input_shape: [32, 32, 3]
  num_classes: 10

initializer:
  name: dctlow_noise
  scale: 1.0
  noise_std: 0.05

training:
  optimizer: sgd
  learning_rate: 0.1
  momentum: 0.9
  batch_size: 32
  epochs: 5

  scheduler:
    type: multistep
    milestones: [0.5, 0.75]
    gamma: 0.1

runtime:
  run_root: runs
  deterministic: true
  verbose: 1