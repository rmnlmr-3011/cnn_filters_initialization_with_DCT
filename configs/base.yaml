# Hyperparamètres globaux, communs à chaque modèle 

#(a redefinir en temps voulu)


experiment_name: baseline_resnet20_cifar10_he
seed: 42

dataset:
  name: cifar10
  validation_split: 0.1
  normalize: true
  augment: false

model:
  name: resnet20
  input_shape: [32, 32, 3]
  num_classes: 10

initializer:
  name: he

training:
  optimizer: sgd
  learning_rate: 0.1
  momentum: 0.9
  batch_size: 32
  epochs: 5

  scheduler:
    type: multistep
    milestones: [0.5, 0.75]
    gamma: 0.1

runtime:
  run_root: runs
  deterministic: true
  verbose: 1


