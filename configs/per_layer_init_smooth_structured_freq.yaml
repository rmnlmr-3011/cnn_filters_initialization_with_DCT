experiment_name: resnet20_cifar10_smooth_structured_frequency
seed: 42

dataset:
  name: cifar10
  validation_split: 0.1
  normalize: true
  augment: false

model:
  name: resnet20
  input_shape: [32, 32, 3]
  num_classes: 10

initializer:
  mode: per_layer
  default:
    name: he

  layer_map:
    stem_conv:
      name: sigma_pure
      scale: 1.0

    group1_block1_conv1:
      name: sigma
      scale: 1.0
      seed: 42

    group2_block1_conv1:
      name: grad
      scale: 1.0
      seed: 42

    group3_block1_conv1:
      name: dctlow
      scale: 1.0
      seed: 42